<div class="upload-card">
  <h2>Analyze an image</h2>
  <p>Run an image through a suite of image provenance checks.</p>
  <form
    action="{{ url_for('main.analyze') }}"
    method="post"
    enctype="multipart/form-data"
    id="analyze-form"
  >
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
    <input type="file" id="file" name="file" accept="image/*" class="sr-only" />

    <div class="upload-inputs">
      <button type="button" id="file-trigger" class="contrast">
        Choose file from device
      </button>

      <div class="url-input-wrapper">
        <input
          type="url"
          id="image_url"
          name="image_url"
          placeholder="Or paste an image URL"
        />
        <button type="submit" class="url-submit" aria-label="Analyze URL">
          &rarr;
        </button>
      </div>
    </div>

    <p class="upload-hint">Drop or paste an image anywhere on this page.</p>
  </form>
</div>

<!-- Full-page drop overlay -->
<div id="drop-overlay" class="drop-overlay" hidden>
  <div class="drop-overlay__content">
    <p>Drop image to analyze</p>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("analyze-form");
    const fileInput = document.getElementById("file");
    const fileTrigger = document.getElementById("file-trigger");
    const urlInput = document.getElementById("image_url");
    const dropOverlay = document.getElementById("drop-overlay");

    if (!form || !fileInput || !urlInput || !dropOverlay) return;

    // Set file and auto-submit
    const handleFile = (file) => {
      if (!file || !file.type.startsWith("image/")) return;
      const dt = new DataTransfer();
      dt.items.add(file);
      fileInput.files = dt.files;
      urlInput.value = ""; // Clear URL field
      form.submit();
    };

    // File picker button
    fileTrigger?.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", (e) => {
      if (e.target.files?.[0]) handleFile(e.target.files[0]);
    });

    // Full-page drag and drop
    let dragCounter = 0;

    const showOverlay = () => {
      dropOverlay.hidden = false;
    };

    const hideOverlay = () => {
      dropOverlay.hidden = true;
    };

    document.addEventListener("dragenter", (e) => {
      e.preventDefault();
      dragCounter++;
      if (dragCounter === 1) showOverlay();
    });

    document.addEventListener("dragleave", (e) => {
      e.preventDefault();
      dragCounter--;
      if (dragCounter === 0) hideOverlay();
    });

    document.addEventListener("dragover", (e) => {
      e.preventDefault();
    });

    document.addEventListener("drop", (e) => {
      e.preventDefault();
      dragCounter = 0;
      hideOverlay();
      const file = e.dataTransfer?.files?.[0];
      if (file) handleFile(file);
    });

    // Paste support (images and URLs)
    document.addEventListener("paste", (e) => {
      const items = e.clipboardData?.items;
      if (!items) return;

      // Check for image data first (screenshots, copied images)
      for (const item of items) {
        if (item.type.startsWith("image/")) {
          const file = item.getAsFile();
          if (file) {
            e.preventDefault();
            handleFile(file);
            return;
          }
        }
      }

      // If pasting into URL field, let it happen naturally
      if (document.activeElement === urlInput) return;

      // Otherwise, check if pasted text looks like a URL
      const text = (e.clipboardData.getData("text") || "").trim();
      if (text && /^https?:\/\/.+/i.test(text)) {
        e.preventDefault();
        urlInput.value = text;
        urlInput.focus();
      }
    });
  });
</script>
