{% set status_class = row.status|lower|replace(' ', '-') %}
{% set details_template = row.template or "partials/analyzers/default.html" %}
<tr id="analyzer-row-{{ row.slug }}">
  <td style="vertical-align: top"><strong>{{ row.name }}</strong></td>
  <td style="vertical-align: top">
    <span class="badge {{ status_class }}">{{ row.status }}</span>
  </td>
  <td>
    {% if row.summary %}
    <p class="analyzer-summary" style="margin: 0 0 0.35rem">
      {{ row.summary }}
    </p>
    {% endif %}
    {% include details_template %}
  </td>
</tr>
