<div class="batch-strip">
  {% set batch_slugs = ["c2pa", "synthid", "exif", "human"] %}
  {% for slug in batch_slugs %}
  <div
    class="mini-card batch-strip__card"
    hx-get="{{ url_for('main.analyzer_fragment', analysis_id=item.analysis_id, slug=slug, mini=1) }}"
    hx-trigger="load"
    hx-swap="innerHTML"
  >
    <div class="mini-card-content">
      <div class="mini-card-title">{{ slug|upper if slug != 'human' else 'Community' }}</div>
      <div class="mini-card-status loading">Loading...</div>
    </div>
  </div>
  {% endfor %}
  <div class="mini-card batch-strip__card">
    <div class="mini-card-content">
      <div class="mini-card-title">Reverse Search</div>
      <div class="mini-search-links">
        {% set encoded_url = item.url | urlencode %}
        <a href="https://lens.google.com/upload?url={{ encoded_url }}" target="_blank" rel="noopener noreferrer" class="mini-search-link">Google</a>
        <a href="https://www.bing.com/images/search?view=detailv2&amp;iss=sbi&amp;form=SBIHMP&amp;q=imgurl:{{ encoded_url }}" target="_blank" rel="noopener noreferrer" class="mini-search-link">Bing</a>
        <a href="https://tineye.com/search?url={{ encoded_url }}" target="_blank" rel="noopener noreferrer" class="mini-search-link">TinEye</a>
      </div>
    </div>
  </div>
</div>
