<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mini View Test</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}" />
    <style>
      body {
        max-width: 600px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      .controls {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1rem;
      }
      input[type="url"] {
        flex: 1;
      }
      button[type=submit] {
        width: revert
      }
      .iframe-container {
        border: 1px solid var(--pico-muted-border-color);
        border-radius: 6px;
        overflow: hidden;
      }
      iframe {
        width: 100%;
        height: 500px;
        border: none;
      }
    </style>
  </head>
  <body>
    <form id="test-form" autocomplete="off">
      <div class="controls">
        <input
          type="url"
          id="image-url"
          name="url"
          placeholder="Image URL"
          required
        />
        <button type="submit">Load</button>
      </div>
    </form>
    <div class="iframe-container">
      <iframe id="mini-iframe" src="about:blank"></iframe>
    </div>
    <script>
      const form = document.getElementById('test-form');
      const iframe = document.getElementById('mini-iframe');
      const urlInput = document.getElementById('image-url');
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const url = urlInput.value.trim();
        if (url) {
          iframe.src = `/analyze-mini?url=${encodeURIComponent(url)}`;
        }
      });
      const params = new URLSearchParams(window.location.search);
      const preloadUrl = params.get('url');
      if (preloadUrl) {
        urlInput.value = preloadUrl;
        iframe.src = `/analyze-mini?url=${encodeURIComponent(preloadUrl)}`;
      }
    </script>
  </body>
</html>
