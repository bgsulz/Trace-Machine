{% extends "base.html" %} {% block content %}
<section>
  <div class="upload-card">
    <hgroup style="margin-bottom: 3rem">
      <h2>Analyze an image</h2>
      <p>Upload a file or paste a URL to trace its provenance.</p>
    </hgroup>
    <form
      action="{{ url_for('main.analyze') }}"
      method="post"
      enctype="multipart/form-data"
    >
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

      <div class="grid">
        <div>
          <label for="file"><strong>Upload File</strong></label>
          <input type="file" id="file" name="file" accept="image/*" />
          <small>Supports JPG, PNG, WEBP</small>
        </div>

        <div
          style="
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--pico-muted-color);
          "
        >
          OR
        </div>

        <div>
          <label for="image_url"><strong>Paste URL</strong></label>
          <input
            type="url"
            id="image_url"
            name="image_url"
            placeholder="https://example.com/image.jpg"
          />
        </div>
      </div>

      <footer style="margin-top: 2rem; text-align: center">
        <button type="submit" class="contrast">Analyze</button>
      </footer>
    </form>
  </div>
</section>
{% endblock %}
