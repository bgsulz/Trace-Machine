<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Trace Machine</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Quando&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/theme.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/custom.css') }}"
    />
    <link
      rel="shortcut icon"
      href="{{ url_for('static', filename='favicon.ico') }}"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"
      integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz"
      crossorigin="anonymous"
    ></script>
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
    <script src="{{ url_for('static', filename='js/hints.js') }}"></script>
    <script src="{{ url_for('static', filename='js/tech_mode.js') }}"></script>
    {% block head_extra %}{% endblock %}
  </head>
  <body>
    <main class="container">
      <header class="site-header">
        <div class="site-header__brand">
          <h1 class="brand-title">
            <a href="{{ url_for('main.index') }}">Trace Machine</a>
          </h1>
          <p class="brand-subtitle">Detect synthetic media using real data.</p>
        </div>
        <div class="site-header__actions">
          <nav class="site-nav" id="primary-nav" aria-label="Primary">
            <a href="{{ url_for('main.index') }}">Analyze</a>
            <a href="{{ url_for('main.batch') }}">Batch</a>
            <a href="{{ url_for('main.analyzer_info') }}">Info</a>
            <a href="#" id="options-link">Options</a>
          </nav>
          <button
            type="button"
            class="nav-toggle"
            id="nav-toggle"
            aria-label="Toggle navigation"
            aria-expanded="false"
            aria-controls="primary-nav"
          >
            ☰
          </button>
        </div>
      </header>

      {% block content %}{% endblock %}
    </main>

    <!-- Options modal -->
    <dialog id="options-modal">
      <article>
        <div class="options-header">
          <h3>Options</h3>
          <button type="button" class="icon-btn" aria-label="Close" id="options-modal-close">
            <img src="{{ url_for('static', filename='icons/xmark.svg') }}" alt="" width="20" height="20" />
          </button>
        </div>
        <fieldset class="options-fieldset">
          <legend>Theme</legend>
          <label><input type="radio" name="theme-mode" value="system" /> System default</label>
          <label><input type="radio" name="theme-mode" value="light" /> Light</label>
          <label><input type="radio" name="theme-mode" value="dark" /> Dark</label>
        </fieldset>
        <label class="option-switch-label">
          <input type="checkbox" role="switch" id="hints-checkbox" />
          <span>Show tips</span>
        </label>
        <label class="option-switch-label">
          <input type="checkbox" role="switch" id="tech-mode-checkbox" />
          <span>
            Technical details
            <small>Show hashes, raw data, and debug information in reports</small>
          </span>
        </label>
      </article>
    </dialog>

    <!-- Toast container -->
    <div id="toast-container" aria-live="polite" aria-atomic="true"
      {% with messages = get_flashed_messages() %}
      {% if messages %}data-initial='{{ messages | tojson }}'{% endif %}
      {% endwith %}></div>

    <script>
      (function() {
        const container = document.getElementById("toast-container");

        function showToast(message) {
          const toast = document.createElement("div");
          toast.className = "toast";
          toast.textContent = message;
          container.appendChild(toast);
          // Trigger reflow for animation
          toast.offsetHeight;
          toast.classList.add("toast-visible");
          setTimeout(() => {
            toast.classList.remove("toast-visible");
            toast.addEventListener("transitionend", () => toast.remove());
          }, 3000);
          setTimeout(() => toast.remove(), 3800);
        }

        // Show any flash messages from page load
        const initial = container.dataset.initial;
        if (initial) {
          JSON.parse(initial).forEach(msg => showToast(msg));
        }

        // Listen for HTMX-triggered toasts
        document.body.addEventListener("showToast", (e) => {
          showToast(e.detail.value);
        });

        // Expose globally for potential direct use
        window.showToast = showToast;
      })();

      document.addEventListener("DOMContentLoaded", () => {
        const optionsLink = document.getElementById("options-link");
        const optionsModal = document.getElementById("options-modal");
        const optionsClose = document.getElementById("options-modal-close");
        if (optionsLink && optionsModal) {
          optionsLink.addEventListener("click", (e) => {
            e.preventDefault();
            optionsModal.showModal();
          });
          optionsModal.addEventListener("click", (e) => {
            if (e.target === optionsModal) optionsModal.close();
          });
        }
        if (optionsClose && optionsModal) {
          optionsClose.addEventListener("click", () => optionsModal.close());
        }
      });

      document.addEventListener("DOMContentLoaded", () => {
        const toggle = document.getElementById("nav-toggle");
        const nav = document.getElementById("primary-nav");
        if (!toggle || !nav) return;

        const closeNav = () => {
          nav.classList.remove("is-open");
          toggle.setAttribute("aria-expanded", "false");
        };

        toggle.addEventListener("click", (event) => {
          event.stopPropagation();
          const isOpen = nav.classList.toggle("is-open");
          toggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
        });

        document.addEventListener("click", (event) => {
          if (
            !nav.classList.contains("is-open") ||
            nav.contains(event.target) ||
            event.target === toggle
          ) {
            return;
          }
          closeNav();
        });

        nav.addEventListener("click", (event) => {
          event.stopPropagation();
        });
      });

      document.body.addEventListener("click", (event) => {
        const link = event.target.closest?.(
          '#analyzer-row-synthid .header-action[href*="lens.google"]'
        );
        if (!link) return;
        const voteArea = document.getElementById("synthid-vote-area");
        if (voteArea) voteArea.removeAttribute("hidden");
      }, true);
    </script>
    {% block body_scripts %}{% endblock %}
  </body>
</html>
