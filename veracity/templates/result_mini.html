<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trace Machine · Mini Report</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/custom.css') }}"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"
      integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mini.css') }}"></link>
  </head>
  <body>
    <main class="mini-container">
      <section class="mini-report">
        <div
          class="overflow-auto mini-table-wrapper"
          data-analysis-id="{{ analysis_id }}"
        >
          <table class="striped">
            <thead>
              <tr>
                <th scope="col" style="width: 20%">Analyzer</th>
                <th scope="col" style="width: 15%">Status</th>
                <th scope="col">Details</th>
              </tr>
            </thead>
            <tbody>
              {% for analyzer in analyzers %} {% set row_id =
              "mini-analyzer-placeholder-" ~ analyzer.slug %}
              <tr
                id="{{ row_id }}"
                hx-get="{{ url_for('main.analyzer_fragment', analysis_id=analysis_id, slug=analyzer.slug, mini='1') }}"
                hx-trigger="load"
                hx-target="#{{ row_id }}"
                hx-swap="outerHTML"
              >
                <td style="vertical-align: top">
                  <strong>{{ analyzer.name }}</strong>
                </td>
                <td style="vertical-align: top">
                  <span class="badge loading">RUNNING</span>
                </td>
                <td>
                  <em>Contacting {{ analyzer.name }}...</em>
                </td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
        {% if analysis_link %}
        <p style="margin: 0.5rem 0 0; text-align: right">
          <a
            href="{{ analysis_link }}"
            target="_blank"
            rel="noopener noreferrer"
            >Open full analysis ↗</a
          >
        </p>
        {% endif %}
      </section>
    </main>
  </body>
</html>
