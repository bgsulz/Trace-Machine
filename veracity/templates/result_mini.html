<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trace Machine · Mini Report</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/custom.css') }}"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"
      integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mini.css') }}"></link>
  </head>
  <body>
    <main class="mini-container">
      <section class="mini-report">
        <div class="overflow-auto mini-table-wrapper" data-analysis-id="{{ analysis_id }}">
          {% with placeholder_prefix="mini-analyzer-placeholder-", mini_mode=True %}
          {% include "partials/analysis_table.html" %}
          {% endwith %}
        </div>
        {% if tools %}
        <div class="mini-tools-wrapper">
          <h3>Analysis Tools</h3>
          {% include "partials/tools_table.html" %}
        </div>
        {% endif %}
        {% if analysis_link %}
        <p style="margin: 0.5rem 0 0; text-align: right">
          <a
            href="{{ analysis_link }}"
            target="_blank"
            rel="noopener noreferrer"
            >Open full analysis ↗</a
          >
        </p>
        {% endif %}
      </section>
    </main>
  </body>
</html>
